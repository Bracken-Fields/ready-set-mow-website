<!doctype html><html><head><meta charset="utf-8"><title>Badges & Pills</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; background: #fff; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .label { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: 0.08em; min-width: 90px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; font-family: var(--font-body); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .badge-svc {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-display); font-style: italic; font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em;
    background: var(--rsm-near-black); color: #fff; padding: 8px 14px; border-radius: 6px; font-size: 13px;
    clip-path: polygon(0 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
    padding-right: 22px;
  }
  .badge-svc.green { background: var(--rsm-racing-green); }
</style></head>
<body>
  <div class="row"><span class="label">Status</span>
    <span class="pill" style="background:var(--rsm-lawn-tint);color:var(--rsm-green-900)"><span class="dot" style="background:var(--rsm-grass-green)"></span>Booked</span>
    <span class="pill" style="background:#FEF3C7;color:#854D0E"><span class="dot" style="background:#D9A21B"></span>Pending</span>
    <span class="pill" style="background:#FEE2E2;color:#7F1D1D"><span class="dot" style="background:#C0322B"></span>Skipped</span>
    <span class="pill" style="background:var(--rsm-ink-100);color:var(--rsm-ink-700)"><span class="dot" style="background:var(--rsm-ink-400)"></span>Off-season</span>
  </div>
  <div class="row"><span class="label">Location</span>
    <span class="pill" style="background:var(--rsm-near-black);color:#fff">Fishers, IN</span>
    <span class="pill" style="background:var(--rsm-near-black);color:#fff">Noblesville, IN</span>
    <span class="pill" style="background:var(--rsm-near-black);color:#fff">Anderson, IN</span>
  </div>
  <div class="row"><span class="label">Service tag</span>
    <span class="badge-svc green">Weekly</span>
    <span class="badge-svc">Biweekly</span>
    <span class="badge-svc green">One-Time</span>
    <span class="badge-svc">Seasonal</span>
  </div>
</body></html>
