<!doctype html><html><head><meta charset="utf-8"><title>Ink Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: #fff; }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .step { height: 96px; position: relative; }
  .step .lbl { position: absolute; left: 8px; bottom: 6px; font-family: var(--font-mono); font-size: 10px; font-weight: 700; }
  .step .hex { position: absolute; right: 8px; bottom: 6px; font-family: var(--font-mono); font-size: 10px; }
  .light .lbl, .light .hex { color: #050806; }
  .dark  .lbl, .dark  .hex { color: #fff; }
  .legend { font-family: var(--font-body); font-size: 12px; color: var(--fg-subtle); margin-top: 10px; display: flex; justify-content: space-between; }
  .legend strong { font-family: var(--font-display); font-style: italic; font-weight: 800; text-transform: uppercase; color: var(--fg); letter-spacing: 0; font-size: 13px; }
</style></head>
<body>
  <div class="row">
    <div class="step light" style="background:#F2F4F2"><span class="lbl">050</span><span class="hex">F2F4F2</span></div>
    <div class="step light" style="background:#E5E8EA"><span class="lbl">100</span><span class="hex">E5E8EA</span></div>
    <div class="step light" style="background:#C9CFD3"><span class="lbl">200</span><span class="hex">C9CFD3</span></div>
    <div class="step light" style="background:#98A0A8"><span class="lbl">300</span><span class="hex">98A0A8</span></div>
    <div class="step dark" style="background:#6B7280"><span class="lbl">400</span><span class="hex">6B7280</span></div>
    <div class="step dark" style="background:#4B545A"><span class="lbl">500</span><span class="hex">4B545A</span></div>
    <div class="step dark" style="background:#353D43"><span class="lbl">600</span><span class="hex">353D43</span></div>
    <div class="step dark" style="background:#1F262B"><span class="lbl">700</span><span class="hex">1F262B</span></div>
    <div class="step dark" style="background:#11181C"><span class="lbl">800</span><span class="hex">11181C</span></div>
    <div class="step dark" style="background:#050806"><span class="lbl">900</span><span class="hex">050806</span></div>
  </div>
  <div class="legend"><strong>Ink Scale</strong><span>900 = Near Black · 400 = Neutral Gray</span></div>
</body></html>
