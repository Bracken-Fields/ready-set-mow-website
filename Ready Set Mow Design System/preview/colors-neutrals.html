<!doctype html><html><head><meta charset="utf-8"><title>Brand Colors — Neutrals & Tints</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 86px; display: flex; align-items: flex-end; padding: 10px; font-family: var(--font-display); font-style: italic; font-weight: 800; font-size: 18px; letter-spacing: -0.01em; text-transform: uppercase; }
  .meta { padding: 8px 10px 10px; }
  .meta .name { font-size: 12px; font-weight: 700; color: var(--fg); }
  .meta .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); margin-top: 2px; }
</style></head>
<body>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#FFFFFF;color:#050806;border-bottom:1px solid var(--border)">White</div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF</div></div></div>
    <div class="swatch"><div class="chip" style="background:#F6F8F3;color:#050806;border-bottom:1px solid var(--border)">Off-White</div><div class="meta"><div class="name">Soft Off-White</div><div class="hex">#F6F8F3</div></div></div>
    <div class="swatch"><div class="chip" style="background:#E8F4DF;color:#050806;border-bottom:1px solid var(--border)">Lawn Tint</div><div class="meta"><div class="name">Light Lawn Tint</div><div class="hex">#E8F4DF</div></div></div>
    <div class="swatch"><div class="chip" style="background:#6B7280;color:#fff">Gray</div><div class="meta"><div class="name">Neutral Gray</div><div class="hex">#6B7280</div></div></div>
  </div>
</body></html>
