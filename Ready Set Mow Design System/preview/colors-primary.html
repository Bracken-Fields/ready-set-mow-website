<!doctype html><html><head><meta charset="utf-8"><title>Brand Colors — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 86px; display: flex; align-items: flex-end; padding: 10px; color: #fff; font-family: var(--font-display); font-style: italic; font-weight: 800; font-size: 18px; letter-spacing: -0.01em; text-transform: uppercase; }
  .meta { padding: 8px 10px 10px; font-family: var(--font-body); }
  .meta .name { font-size: 12px; font-weight: 700; color: var(--fg); }
  .meta .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); margin-top: 2px; }
  .dark .chip { color: #fff; }
  .light .chip { color: #050806; text-shadow: none; }
</style></head>
<body>
  <div class="grid">
    <div class="swatch dark"><div class="chip" style="background:#2F7D12">Racing</div><div class="meta"><div class="name">Racing Green</div><div class="hex">#2F7D12</div></div></div>
    <div class="swatch dark"><div class="chip" style="background:#5FB832">Grass</div><div class="meta"><div class="name">Fresh Grass</div><div class="hex">#5FB832</div></div></div>
    <div class="swatch dark"><div class="chip" style="background:#041B10">Forest</div><div class="meta"><div class="name">Deep Forest</div><div class="hex">#041B10</div></div></div>
    <div class="swatch dark"><div class="chip" style="background:#050806">Black</div><div class="meta"><div class="name">Near Black</div><div class="hex">#050806</div></div></div>
  </div>
</body></html>
