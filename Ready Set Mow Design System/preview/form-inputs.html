<!doctype html><html><head><meta charset="utf-8"><title>Form Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; background: #fff; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; max-width: 620px; }
  label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg); margin-bottom: 6px; }
  .input, select, textarea {
    width: 100%; font-family: var(--font-body); font-size: 15px;
    padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: 8px;
    background: #fff; color: var(--fg); transition: border-color 120ms, box-shadow 120ms;
  }
  .input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(47,125,18,0.18);
  }
  .input::placeholder { color: var(--rsm-ink-300); }
  .helper { font-size: 12px; color: var(--fg-subtle); margin-top: 4px; }
  .check { display: flex; align-items: center; gap: 10px; font-size: 14px; }
  .check input { width: 18px; height: 18px; accent-color: var(--accent); }
</style></head>
<body>
  <div class="grid">
    <div><label>Name</label><input class="input" placeholder="Jamie Carter"></div>
    <div><label>Phone</label><input class="input" value="(317) 555-1213"></div>
    <div style="grid-column:1/-1"><label>Address</label><input class="input" placeholder="123 Maple Ridge Dr, Fishers"></div>
    <div><label>City</label>
      <select><option>Fishers</option><option>Noblesville</option><option>Anderson</option></select>
    </div>
    <div><label>Service</label>
      <select><option>Weekly Mowing</option><option>Biweekly</option><option>One-time Cut</option></select>
    </div>
    <div style="grid-column:1/-1"><label>Notes</label><textarea rows="2" placeholder="Gate code, dog in yard, etc."></textarea></div>
    <div class="check" style="grid-column:1/-1"><input type="checkbox" checked><span>Text me — don't call.</span></div>
  </div>
</body></html>
