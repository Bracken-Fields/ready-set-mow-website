<!doctype html><html><head><meta charset="utf-8"><title>Iconography — Lucide</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px 26px; background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px 6px; border: 1px solid var(--border); border-radius: 8px; }
  .ic svg { width: 24px; height: 24px; stroke: var(--rsm-near-black); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .ic .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: 0.04em; }
  .note { font-family: var(--font-body); font-size: 11px; color: var(--fg-subtle); margin-top: 14px; line-height: 1.5; }
  .note b { color: var(--accent); }
</style></head>
<body>
  <div class="grid">
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span class="lbl">phone</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="lbl">text</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="lbl">calendar</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span class="lbl">map-pin</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span class="lbl">check</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg><span class="lbl">arrow</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span class="lbl">clock</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 2 4 7v6c0 5 3.5 8.5 8 9 4.5-.5 8-4 8-9V7l-8-5z"/></svg><span class="lbl">shield</span></div>
  </div>
  <div class="note"><b>Lucide</b> · 2px stroke · rounded caps · currentColor. No emoji. No filled icons.</div>
</body></html>
