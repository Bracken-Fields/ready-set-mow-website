<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .cell { text-align: center; }
  .box { height: 88px; background: var(--rsm-lawn-tint); border: 1px solid var(--rsm-green-200); margin-bottom: 8px; }
  .name { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--fg); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); }
</style></head>
<body>
  <div class="grid">
    <div class="cell"><div class="box" style="border-radius:4px"></div><div class="name">--r-sm</div><div class="px">4 px</div></div>
    <div class="cell"><div class="box" style="border-radius:8px"></div><div class="name">--r-md</div><div class="px">8 px</div></div>
    <div class="cell"><div class="box" style="border-radius:12px"></div><div class="name">--r-lg</div><div class="px">12 px</div></div>
    <div class="cell"><div class="box" style="border-radius:16px"></div><div class="name">--r-xl</div><div class="px">16 px</div></div>
    <div class="cell"><div class="box" style="border-radius:24px"></div><div class="name">--r-2xl</div><div class="px">24 px</div></div>
    <div class="cell"><div class="box" style="border-radius:999px"></div><div class="name">--r-pill</div><div class="px">pill</div></div>
  </div>
</body></html>
