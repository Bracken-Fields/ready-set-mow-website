<!doctype html><html><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 32px; background: #fff; font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: 70px 1fr 80px; align-items: center; gap: 14px; padding: 6px 0; }
  .name { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--fg); }
  .bar { height: 14px; background: var(--rsm-racing-green); border-radius: 3px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); text-align: right; }
</style></head>
<body>
  <div class="row"><span class="name">--space-1</span><div class="bar" style="width:4px"></div><span class="px">4 px</span></div>
  <div class="row"><span class="name">--space-2</span><div class="bar" style="width:8px"></div><span class="px">8 px</span></div>
  <div class="row"><span class="name">--space-3</span><div class="bar" style="width:12px"></div><span class="px">12 px</span></div>
  <div class="row"><span class="name">--space-4</span><div class="bar" style="width:16px"></div><span class="px">16 px</span></div>
  <div class="row"><span class="name">--space-6</span><div class="bar" style="width:24px"></div><span class="px">24 px</span></div>
  <div class="row"><span class="name">--space-8</span><div class="bar" style="width:32px"></div><span class="px">32 px</span></div>
  <div class="row"><span class="name">--space-12</span><div class="bar" style="width:48px"></div><span class="px">48 px</span></div>
  <div class="row"><span class="name">--space-16</span><div class="bar" style="width:64px"></div><span class="px">64 px</span></div>
  <div class="row"><span class="name">--space-24</span><div class="bar" style="width:96px"></div><span class="px">96 px</span></div>
</body></html>
