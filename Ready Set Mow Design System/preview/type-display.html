<!doctype html><html><head><meta charset="utf-8"><title>Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; background: #fff; }
  .specimen { font-family: var(--font-display); font-style: italic; font-weight: 900; font-size: 84px; line-height: 0.95; letter-spacing: -0.015em; text-transform: uppercase; color: var(--fg); }
  .specimen .accent { color: var(--accent); }
  .meta { display: flex; justify-content: space-between; align-items: baseline; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
  .meta .name { font-family: var(--font-display); font-style: italic; font-weight: 800; text-transform: uppercase; font-size: 14px; }
  .meta .spec { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
</style></head>
<body>
  <div class="specimen">Ready. <span class="accent">Set.</span> Mow.</div>
  <div class="meta">
    <span class="name">Display · Barlow Condensed</span>
    <span class="spec">900 italic · UPPERCASE · tracking -0.015em</span>
  </div>
</body></html>
