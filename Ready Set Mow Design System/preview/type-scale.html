<!doctype html><html><head><meta charset="utf-8"><title>Type Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 32px; background: #fff; font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: 90px 1fr 130px; align-items: baseline; padding: 10px 0; border-bottom: 1px dashed var(--border); }
  .row:last-child { border: 0; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: 0.06em; }
  .sample.display { font-family: var(--font-display); font-style: italic; font-weight: 800; text-transform: uppercase; letter-spacing: -0.01em; color: var(--fg); line-height: 1.0; }
  .sample.body { font-family: var(--font-body); color: var(--fg); }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); text-align: right; }
</style></head>
<body>
  <div class="row"><span class="label">Display LG</span><span class="sample display" style="font-size:54px">Sharp Cuts</span><span class="spec">54 / 800i</span></div>
  <div class="row"><span class="label">Display MD</span><span class="sample display" style="font-size:38px">Sharp Cuts</span><span class="spec">38 / 800i</span></div>
  <div class="row"><span class="label">H1</span><span class="sample display" style="font-size:30px">Lawn Care That Shows Up</span><span class="spec">30 / 800i</span></div>
  <div class="row"><span class="label">H2</span><span class="sample display" style="font-size:22px;letter-spacing:0">Why ReadySetMow</span><span class="spec">22 / 800i</span></div>
  <div class="row"><span class="label">Body LG</span><span class="sample body" style="font-size:18px;font-weight:500">Fast, reliable mowing for Anderson, Noblesville &amp; Fishers.</span><span class="spec">18 / 500</span></div>
  <div class="row"><span class="label">Body</span><span class="sample body" style="font-size:16px">No contracts. Easy text scheduling. Real local crew.</span><span class="spec">16 / 400</span></div>
  <div class="row"><span class="label">Caption</span><span class="sample body" style="font-size:12px;color:var(--fg-subtle);text-transform:uppercase;letter-spacing:0.14em;font-weight:700">Local · Indiana</span><span class="spec">12 / 700 caps</span></div>
</body></html>
